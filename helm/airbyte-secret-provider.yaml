apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: airbyte-secrets
  namespace: airbyte
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "${AKS_KUBELET_IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEYVAULT_NAME}"
    objects: |
      array:
        - |
          objectName: postgres-admin-password
          objectType: secret
        - |
          objectName: postgres-fqdn
          objectType: secret
        - |
          objectName: blob-connection-string
          objectType: secret
          # TODO: add blob-connection-string secret to Key Vault after terraform apply
          # Value: DefaultEndpointsProtocol=https;AccountName=<name>;AccountKey=<key>;...
          # Retrieve key: az storage account keys list --account-name <name>
    tenantId: "${AZURE_TENANT_ID}"
  secretObjects:
    - secretName: airbyte-secrets
      type: Opaque
      data:
        - objectName: postgres-admin-password
          key: db-password
        - objectName: postgres-fqdn
          key: db-host
        - objectName: blob-connection-string
          key: blob-connection-string
