# Chart: superset/superset
# Repo:  helm repo add superset https://apache.github.io/superset

# Disable bundled PostgreSQL — use the shared external instance
postgresql:
  enabled: false

# Use the Redis instance bundled with this chart — do not disable
redis:
  enabled: true

externalDatabase:
  host: "${POSTGRES_FQDN}"
  port: 5432
  user: "${POSTGRES_ADMIN_USERNAME}"
  database: superset_db
  existingSecret: superset-secrets
  existingSecretPasswordKey: db-password

configOverrides:
  secret: |
    SECRET_KEY = os.environ.get("SUPERSET_SECRET_KEY", "")

extraEnvRaw:
  - name: SUPERSET_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: superset-secrets
        key: superset-secret-key

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi

# Mount the CSI volume so the driver creates the superset-secrets Kubernetes
# secret before the container starts and reads existingSecret / secretKeyRef.
extraVolumes:
  - name: secrets-store
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: superset-secrets

extraVolumeMounts:
  - name: secrets-store
    mountPath: /mnt/secrets-store
    readOnly: true
