# Chart: spark-operator/spark-operator
# Repo:  helm repo add spark-operator https://kubeflow.github.io/spark-operator
#
# Installs the spark-operator controller only. Spark jobs are submitted as
# SparkApplication CRDs by Airflow's SparkKubernetesOperator at runtime —
# there is no persistent master/worker cluster.

controller:
  workers: 2  # TODO: tune concurrent SparkApplication reconcilers for workload

# Webhook is required for mounting volumes into driver/executor pods
# (used by the Secrets Store CSI Driver to inject Key Vault secrets)
webhook:
  enable: true

# Service account used by Spark driver and executor pods.
# Annotated for AKS workload identity so pods authenticate to ADLS Gen2
# without static credentials.
spark:
  serviceAccount:
    create: true
    name: spark
    annotations:
      azure.workload.identity/client-id: "${AKS_KUBELET_IDENTITY_CLIENT_ID}"

# SparkApplication template reference — submitted by Airflow at runtime:
#
#   image: ${ACR_LOGIN_SERVER}/spark:${SPARK_IMAGE_TAG}
#   driver.serviceAccount: spark
#   driver.nodeSelector.agentpool: system
#   executor.nodeSelector.agentpool: spark
#   executor.tolerations: [{key: dedicated, value: spark, effect: NoSchedule}]
#   executor.memory: 8g   # TODO: tune per job
#   executor.cores: 2     # TODO: tune per job
#   sparkConf:
#     spark.hadoop.fs.azure.account.auth.type: OAuth
#     spark.hadoop.fs.azure.account.oauth.provider.type: org.apache.hadoop.fs.azurebfs.oauth2.WorkloadIdentityTokenProvider
