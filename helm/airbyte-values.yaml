# Chart: airbyte/airbyte
# Repo:  helm repo add airbyte https://airbytehq.github.io/helm-charts

postgresql:
  enabled: false

minio:
  enabled: false

global:
  database:
    type: external
    host: "${POSTGRES_FQDN}"
    port: 5432
    database: airbyte_db
    # Chart 1.9.x uses secretName/passwordSecretKey/userSecretKey — NOT existingSecret.
    # These tell the chart to read DATABASE_PASSWORD and DATABASE_USER env vars
    # from our CSI-provisioned secret rather than its own airbyte-airbyte-secrets.
    secretName: airbyte-secrets
    passwordSecretKey: db-password
    userSecretKey: db-username

  logs:
    storage:
      type: azure
      azure:
        storageAccountName: "${BLOB_STORAGE_ACCOUNT_NAME}"
        storageContainerName: airbyte-logs
        # Authenticate via AKS workload identity — no static connection string
        # TODO: complete workload identity annotation on the Airbyte service account
        # storageAccountKey pulled from secret if workload identity is not yet wired
        existingSecret: airbyte-secrets
        existingSecretKey: blob-connection-string

  state:
    storage:
      type: azure
      azure:
        storageAccountName: "${BLOB_STORAGE_ACCOUNT_NAME}"
        storageContainerName: airbyte-state
        existingSecret: airbyte-secrets
        existingSecretKey: blob-connection-string

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi

# JVM startup on a cold node takes longer than the chart defaults allow.
# Raise initialDelaySeconds and failureThreshold so pods aren't killed
# mid-startup and don't trigger a restart loop during helm install.
server:
  livenessProbe:
    initialDelaySeconds: 120
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 90
    failureThreshold: 6

worker:
  livenessProbe:
    initialDelaySeconds: 120
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 90
    failureThreshold: 6

workload-api-server:
  livenessProbe:
    initialDelaySeconds: 120
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 90
    failureThreshold: 6

workload-launcher:
  livenessProbe:
    initialDelaySeconds: 120
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 90
    failureThreshold: 6
