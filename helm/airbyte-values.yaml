# Chart: airbyte/airbyte
# Repo:  helm repo add airbyte https://airbytehq.github.io/helm-charts

postgresql:
  enabled: false

minio:
  enabled: false

global:
  database:
    type: external
    host: "${POSTGRES_FQDN}"
    port: 5432
    database: airbyte_db
    # Chart 1.9.x uses secretName/passwordSecretKey/userSecretKey — NOT existingSecret.
    # These tell the chart to read DATABASE_PASSWORD and DATABASE_USER env vars
    # from our CSI-provisioned secret rather than its own airbyte-airbyte-secrets.
    secretName: airbyte-secrets
    passwordSecretKey: db-password
    userSecretKey: db-username

  storage:
    # Setting type to azure eliminates the minio-create-bucket post-upgrade hook,
    # which loops forever when minio.enabled=false and causes CI timeouts.
    type: azure
    storageSecretName: airbyte-secrets
    bucket:
      log: airbyte-logs
      state: airbyte-state
      workloadOutput: airbyte-state
    azure:
      connectionStringSecretKey: blob-connection-string

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi

# JVM startup on a cold node takes longer than the chart defaults allow.
# Raise initialDelaySeconds and failureThreshold so pods aren't killed
# mid-startup and don't trigger a restart loop during helm install.
server:
  livenessProbe:
    initialDelaySeconds: 120
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 90
    failureThreshold: 6

worker:
  livenessProbe:
    initialDelaySeconds: 120
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 90
    failureThreshold: 6

workload-api-server:
  livenessProbe:
    initialDelaySeconds: 120
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 90
    failureThreshold: 6

workload-launcher:
  livenessProbe:
    initialDelaySeconds: 120
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 90
    failureThreshold: 6
