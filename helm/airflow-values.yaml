# Chart: apache-airflow/airflow
# Repo:  helm repo add apache-airflow https://airflow.apache.org

executor: KubernetesExecutor

# Disable bundled PostgreSQL — use the shared external instance
postgresql:
  enabled: false

data:
  # Full SQLAlchemy URI is stored in Key Vault as airflow-db-uri and mapped
  # to the 'connection' key in airflow-secrets by the SecretProviderClass.
  # metadataSecretName expects exactly this key name.
  metadataSecretName: airflow-secrets

fernetKeySecretName: airflow-secrets
webserverSecretKeySecretName: airflow-secrets

# DAG storage — placeholder ConfigMap mounted via extraVolumes
# TODO: replace with git-sync sidecar pointing to your DAGs repository
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false  # TODO: enable and configure git-sync for production DAG delivery

extraVolumes:
  - name: dags-placeholder
    configMap:
      name: airflow-dags-placeholder

extraVolumeMounts:
  - name: dags-placeholder
    mountPath: /opt/airflow/dags/noop_dag.py
    subPath: noop_dag.py
    readOnly: true

# KubernetesExecutor pod template
workers:
  kubernetes:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi   # TODO: tune per DAG requirements
      limits:
        memory: 1Gi

scheduler:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

webserver:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
