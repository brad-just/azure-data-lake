apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: superset-secrets
  namespace: superset
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    name: superset-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: postgres-admin-password
    - secretKey: superset-secret-key
      remoteRef:
        key: superset-secret-key
        # TODO: add superset-secret-key to Key Vault before deploying
        # Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
        # Then: az keyvault secret set --vault-name <kv> --name superset-secret-key --value <value>
