apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-secrets
  namespace: airflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    name: airflow-secrets
    creationPolicy: Owner
  data:
    - secretKey: connection
      remoteRef:
        key: airflow-db-uri
        # Full SQLAlchemy URI — metadataSecretName expects a 'connection' key.
        # Add to Key Vault before deploying:
        #   PASS=$(az keyvault secret show --vault-name $KV --name postgres-admin-password --query value -o tsv)
        #   FQDN=$(az keyvault secret show --vault-name $KV --name postgres-fqdn --query value -o tsv)
        #   az keyvault secret set --vault-name $KV --name airflow-db-uri \
        #     --value "postgresql+psycopg2://<admin-user>:${PASS}@${FQDN}:5432/airflow_db?sslmode=require"
    - secretKey: fernet-key
      remoteRef:
        key: airflow-fernet-key
        # TODO: add airflow-fernet-key to Key Vault before deploying
        # Generate with: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
        # Then: az keyvault secret set --vault-name <kv> --name airflow-fernet-key --value <value>
---
# Placeholder DAG ConfigMap — replace with git-sync for production
# TODO: wire git-sync sidecar in airflow-values.yaml and remove this ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-dags-placeholder
  namespace: airflow
data:
  noop_dag.py: |
    from airflow import DAG
    from airflow.operators.empty import EmptyOperator
    from datetime import datetime

    with DAG(
        dag_id="noop",
        start_date=datetime(2024, 1, 1),
        schedule=None,
        catchup=False,
    ) as dag:
        EmptyOperator(task_id="noop")
