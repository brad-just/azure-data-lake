apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airbyte-secrets
  namespace: airbyte
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    name: airbyte-secrets
    creationPolicy: Owner
  data:
    - secretKey: db-username
      remoteRef:
        key: postgres-admin-username
    - secretKey: db-password
      remoteRef:
        key: postgres-admin-password
    - secretKey: db-host
      remoteRef:
        key: postgres-fqdn
    - secretKey: blob-connection-string
      remoteRef:
        key: blob-connection-string
        # TODO: add blob-connection-string secret to Key Vault after terraform apply
        # Value: DefaultEndpointsProtocol=https;AccountName=<name>;AccountKey=<key>;...
        # Retrieve key: az storage account keys list --account-name <name>
