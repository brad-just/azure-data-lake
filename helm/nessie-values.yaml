# Chart: projectnessie/nessie
# Repo:  helm repo add projectnessie https://charts.projectnessie.org

service:
  type: ClusterIP
  port: 19120

versionStoreConfig:
  storageType: JDBC

# JDBC datasource — credentials injected from the ESO-provisioned secret.
extraEnv:
  - name: QUARKUS_DATASOURCE_JDBC_URL
    valueFrom:
      secretKeyRef:
        name: nessie-secrets
        key: jdbc-url
  - name: QUARKUS_DATASOURCE_USERNAME
    value: "${POSTGRES_ADMIN_USERNAME}"
  - name: QUARKUS_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: nessie-secrets
        key: db-password

# Nessie is stateless in-pod — all state lives in PostgreSQL.
# Short grace period avoids the rolling-update stall where the old pod
# stays in Terminating long enough to hit the progress deadline.
terminationGracePeriodSeconds: 15

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi
