# Chart: projectnessie/nessie
# Repo:  helm repo add projectnessie https://charts.projectnessie.org

service:
  type: ClusterIP
  port: 19120

versionStoreConfig:
  storageType: JDBC

# JDBC datasource — credentials injected from the CSI-provisioned secret.
# The secret (nessie-secrets) is mounted by the SecretProviderClass in
# nessie-secret-provider.yaml and projected as a Kubernetes secret.
extraEnv:
  - name: QUARKUS_DATASOURCE_JDBC_URL
    valueFrom:
      secretKeyRef:
        name: nessie-secrets
        key: jdbc-url
  - name: QUARKUS_DATASOURCE_USERNAME
    value: "${POSTGRES_ADMIN_USERNAME}"
  - name: QUARKUS_DATASOURCE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: nessie-secrets
        key: db-password

# Volume mount is required — the CSI driver only creates the nessie-secrets
# Kubernetes secret when a pod mounts this volume. Without it the secretKeyRef
# env vars above will fail to resolve and the pod will not start.
extraVolumes:
  - name: secrets-store
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: nessie-secrets

extraVolumeMounts:
  - name: secrets-store
    mountPath: /mnt/secrets-store
    readOnly: true

# Nessie is stateless in-pod — all state lives in PostgreSQL.
# Short grace period avoids the rolling-update stall where the old pod
# stays in Terminating long enough to hit the progress deadline.
terminationGracePeriodSeconds: 15

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi
