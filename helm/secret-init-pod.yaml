apiVersion: v1
kind: Pod
metadata:
  name: secret-init
  namespace: ${SVC}
spec:
  restartPolicy: Never
  # Sleeps for 600s so the CSI volume stays mounted (and the K8s secret stays alive)
  # through the entire helm install. Deleted by deploy() after helm finishes.
  # Tolerate transient node conditions so the pod isn't evicted mid-deploy.
  # Without these, a brief not-ready/unreachable taint causes the taint manager
  # to delete the pod, which triggers the CSI driver to delete the K8s secret.
  tolerations:
  - key: node.kubernetes.io/not-ready
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 300
  - key: node.kubernetes.io/unreachable
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 300
  containers:
  - name: init
    image: busybox:stable
    command: ["sh", "-c", "echo secrets mounted && sleep 600"]
    volumeMounts:
    - name: secrets
      mountPath: /mnt/secrets
  volumes:
  - name: secrets
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: ${SVC}-secrets
