apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: superset-secrets
  namespace: superset
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "${AKS_KUBELET_IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEYVAULT_NAME}"
    objects: |
      array:
        - |
          objectName: postgres-admin-password
          objectType: secret
        - |
          objectName: superset-secret-key
          objectType: secret
          # TODO: add superset-secret-key to Key Vault before deploying
          # Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
          # Then: az keyvault secret set --vault-name <kv> --name superset-secret-key --value <value>
    tenantId: "${AZURE_TENANT_ID}"
  secretObjects:
    - secretName: superset-secrets
      type: Opaque
      data:
        - objectName: postgres-admin-password
          key: db-password
        - objectName: superset-secret-key
          key: superset-secret-key
