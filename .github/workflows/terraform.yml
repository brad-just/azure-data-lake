name: Terraform

on:
  push:
    branches: [main]
    paths: ['terraform/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: fmt check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: init (no backend)
        run: terraform init -backend=false
        working-directory: terraform

      - name: validate
        run: terraform validate
        working-directory: terraform

  plan:
    needs: lint
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}"
        working-directory: terraform

      - name: plan
        run: |
          terraform plan -out=tfplan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="location=${{ secrets.TF_LOCATION }}" \
            -var="resource_group_name=${{ secrets.TF_RESOURCE_GROUP_NAME }}" \
            -var="project=${{ secrets.TF_PROJECT }}" \
            -var="environment=${{ secrets.TF_ENVIRONMENT }}" \
            -var="adls_storage_account_name=${{ secrets.ADLS_STORAGE_ACCOUNT_NAME }}" \
            -var="blob_storage_account_name=${{ secrets.BLOB_STORAGE_ACCOUNT_NAME }}" \
            -var="keyvault_name=${{ secrets.KEYVAULT_NAME }}" \
            -var="acr_name=${{ secrets.ACR_NAME }}" \
            -var="postgres_admin_username=${{ secrets.POSTGRES_ADMIN_USERNAME }}" \
            -var="github_org=${{ secrets.TF_GITHUB_ORG }}" \
            -var="github_repo=${{ secrets.TF_GITHUB_REPO }}" \
            -var="api_server_authorized_ip_ranges=[\"${{ secrets.TF_API_SERVER_IP_RANGES }}\"]"
        working-directory: terraform

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 5

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: production  # requires manual approval via GitHub environment protection rules
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}"
        working-directory: terraform

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: apply
        run: terraform apply tfplan
        working-directory: terraform
        # tfplan already contains the variables baked in from the plan step —
        # no need to re-pass -var flags here.
