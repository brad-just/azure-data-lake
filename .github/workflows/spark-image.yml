name: Spark Image

on:
  push:
    branches: [main]
    paths: ['docker/spark/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  variables: write  # required to update SPARK_IMAGE_TAG repo variable

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: build and push
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/spark"
          docker build \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            docker/spark/
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: update SPARK_IMAGE_TAG variable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh variable set SPARK_IMAGE_TAG --body "${{ github.sha }}" --repo "${{ github.repository }}"
