name: Helm Deploy

on:
  push:
    branches: [main]
    paths: ['helm/**']
  workflow_run:
    workflows: ['Spark Image']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (leave empty to deploy all in order)'
        required: false
        type: string
      spark_image_tag:
        description: 'Spark image tag override (leave empty to use latest built SHA)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: helm-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      # Substituted into values files and secret provider manifests via envsubst
      POSTGRES_FQDN: ${{ secrets.POSTGRES_FQDN }}
      POSTGRES_ADMIN_USERNAME: ${{ secrets.POSTGRES_ADMIN_USERNAME }}
      ADLS_STORAGE_ACCOUNT_NAME: ${{ secrets.ADLS_STORAGE_ACCOUNT_NAME }}
      BLOB_STORAGE_ACCOUNT_NAME: ${{ secrets.BLOB_STORAGE_ACCOUNT_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      KEYVAULT_NAME: ${{ secrets.KEYVAULT_NAME }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AKS_KUBELET_IDENTITY_CLIENT_ID: ${{ secrets.AKS_KUBELET_IDENTITY_CLIENT_ID }}
      # When triggered by workflow_run, use the SHA from the spark-image build.
      # When triggered manually, prefer the explicit input, then fall back to the repo variable.
      SPARK_IMAGE_TAG: ${{ github.event.workflow_run.head_sha || inputs.spark_image_tag || vars.SPARK_IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/setup-helm@v4

      - name: add runner IP to AKS authorized ranges
        id: aks-ip
        run: |
          RUNNER_IP="$(curl -s https://api.ipify.org)/32"
          ORIGINAL=$(az aks show \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --query 'apiServerAccessProfile.authorizedIpRanges' \
            -o tsv | tr '\t' ',')
          echo "original=${ORIGINAL}" >> $GITHUB_OUTPUT
          az aks update \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --api-server-authorized-ip-ranges "${ORIGINAL:+$ORIGINAL,}${RUNNER_IP}"

      - uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: pre-flight node readiness check
        run: |
          echo "Waiting for all nodes to be Ready..."
          for i in $(seq 1 24); do
            NOT_READY=$(kubectl get nodes --no-headers 2>/dev/null \
              | awk '$2 != "Ready" {print $1}')
            if [ -z "$NOT_READY" ]; then
              echo "All nodes are Ready."
              exit 0
            fi
            echo "Not-ready nodes: $NOT_READY — waiting 15s (attempt $i/24)"
            sleep 15
          done
          echo "Timed out waiting for nodes to become Ready."
          kubectl get nodes
          exit 1

      - name: add helm repos
        run: |
          helm repo add projectnessie  https://charts.projectnessie.org
          helm repo add airbyte        https://airbytehq.github.io/helm-charts
          helm repo add spark-operator https://kubeflow.github.io/spark-operator
          helm repo add trinodb        https://trinodb.github.io/charts
          helm repo add apache-airflow https://airflow.apache.org
          helm repo add superset       https://apache.github.io/superset
          helm repo update

      - name: deploy all services
        if: ${{ !inputs.service }}
        run: |
          bootstrap_secrets() {
            local svc=$1
            [ -f "helm/${svc}-secret-provider.yaml" ] || return 0
            # Run a short-lived pod that mounts the CSI volume. The Secrets Store
            # CSI driver creates the Kubernetes secret during volume mounting, so
            # it exists before any chart pod starts and reads it via secretKeyRef
            # or existingSecret. Pod is deleted immediately after.
            SVC="${svc}" envsubst '${SVC}' < helm/secret-init-pod.yaml \
              | kubectl apply -n "${svc}" -f -
            kubectl wait pod/secret-init -n "${svc}" \
              --for=jsonpath='{.status.phase}'=Succeeded \
              --timeout=90s
            kubectl delete pod secret-init -n "${svc}" --ignore-not-found
          }

          recover_release() {
            local svc=$1
            local status
            status=$(helm status "$svc" -n "$svc" --output json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-installed")
            case "$status" in
              pending-upgrade|pending-install|pending-rollback)
                echo "Release ${svc} is stuck in ${status} — rolling back"
                helm rollback "$svc" -n "$svc" --wait --timeout 2m || \
                  helm uninstall "$svc" -n "$svc" --wait --timeout 2m || true
                ;;
              failed)
                echo "Release ${svc} is in failed state — rolling back"
                helm rollback "$svc" -n "$svc" --wait --timeout 2m || \
                  helm uninstall "$svc" -n "$svc" --wait --timeout 2m || true
                ;;
              *)
                echo "Release ${svc} status: ${status}"
                ;;
            esac
          }

          deploy() {
            local svc=$1 chart=$2 version=$3 timeout=$4
            echo "=== Deploying ${svc} ==="
            kubectl create namespace "$svc" --dry-run=client -o yaml | kubectl apply -f -
            # Force-delete pods stuck in Terminating for more than 2 minutes.
            # Pods still within their grace period are left alone to shut down cleanly.
            kubectl get pods -n "$svc" -o json \
              | jq -r '.items[] | select(.metadata.deletionTimestamp != null) | select((now - (.metadata.deletionTimestamp | fromdateiso8601)) > 120) | .metadata.name' \
              | xargs -r kubectl delete pod -n "$svc" --force --grace-period=0
            recover_release "$svc"
            if [ -f "helm/${svc}-secret-provider.yaml" ]; then
              envsubst < "helm/${svc}-secret-provider.yaml" | kubectl apply -f -
              bootstrap_secrets "$svc"
            fi
            helm upgrade --install "$svc" "$chart" \
              --version "$version" \
              -f <(envsubst < "helm/${svc}-values.yaml") \
              --namespace "$svc" --atomic --cleanup-on-fail --timeout "$timeout"
          }

          # Read pinned versions from helm/chart-versions.yaml
          nessie_ver=$(yq   '.nessie'   helm/chart-versions.yaml)
          airbyte_ver=$(yq  '.airbyte'  helm/chart-versions.yaml)
          spark_ver=$(yq    '.spark'    helm/chart-versions.yaml)
          trino_ver=$(yq    '.trino'    helm/chart-versions.yaml)
          airflow_ver=$(yq  '.airflow'  helm/chart-versions.yaml)
          superset_ver=$(yq '.superset' helm/chart-versions.yaml)

          #                svc      chart                          version        timeout
          deploy nessie   projectnessie/nessie         "$nessie_ver"   5m
          deploy airbyte  airbyte/airbyte               "$airbyte_ver"  15m
          deploy spark    spark-operator/spark-operator "$spark_ver"    5m
          deploy trino    trinodb/trino                 "$trino_ver"    5m
          deploy airflow  apache-airflow/airflow        "$airflow_ver"  5m
          deploy superset superset/superset             "$superset_ver" 5m

      - name: deploy single service
        if: ${{ inputs.service }}
        run: |
          declare -A CHARTS=(
            [nessie]="projectnessie/nessie"
            [airbyte]="airbyte/airbyte"
            [spark]="spark-operator/spark-operator"
            [trino]="trinodb/trino"
            [airflow]="apache-airflow/airflow"
            [superset]="superset/superset"
          )
          # Read pinned version from helm/chart-versions.yaml
          version=$(yq ".${svc}" helm/chart-versions.yaml)
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "No pinned version found for ${svc} in helm/chart-versions.yaml"
            exit 1
          fi
          svc="${{ inputs.service }}"
          chart="${CHARTS[$svc]}"
          if [ -z "$chart" ]; then
            echo "Unknown service: $svc. Valid values: ${!CHARTS[*]}"
            exit 1
          fi
          kubectl create namespace "$svc" --dry-run=client -o yaml | kubectl apply -f -
          kubectl get pods -n "$svc" -o json \
            | jq -r '.items[] | select(.metadata.deletionTimestamp != null) | select((now - (.metadata.deletionTimestamp | fromdateiso8601)) > 120) | .metadata.name' \
            | xargs -r kubectl delete pod -n "$svc" --force --grace-period=0
          # Recover stuck Helm release state before attempting upgrade
          release_status=$(helm status "$svc" -n "$svc" --output json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-installed")
          case "$release_status" in
            pending-upgrade|pending-install|pending-rollback|failed)
              echo "Release ${svc} is stuck in ${release_status} — rolling back"
              helm rollback "$svc" -n "$svc" --wait --timeout 2m || \
                helm uninstall "$svc" -n "$svc" --wait --timeout 2m || true
              ;;
          esac
          if [ -f "helm/${svc}-secret-provider.yaml" ]; then
            envsubst < "helm/${svc}-secret-provider.yaml" | kubectl apply -f -
            SVC="${svc}" envsubst '${SVC}' < helm/secret-init-pod.yaml \
              | kubectl apply -n "${svc}" -f -
            kubectl wait pod/secret-init -n "${svc}" \
              --for=jsonpath='{.status.phase}'=Succeeded \
              --timeout=90s
            kubectl delete pod secret-init -n "${svc}" --ignore-not-found
          fi
          declare -A TIMEOUTS=([airbyte]="15m")
          timeout="${TIMEOUTS[$svc]:-5m}"
          helm upgrade --install "$svc" "$chart" \
            --version "$version" \
            -f <(envsubst < "helm/${svc}-values.yaml") \
            --namespace "$svc" --atomic --cleanup-on-fail --timeout "$timeout"

      - name: remove runner IP from AKS authorized ranges
        if: always()
        run: |
          az aks update \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --api-server-authorized-ip-ranges "${{ steps.aks-ip.outputs.original }}" \
            --no-wait
